<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hopfenhirne Admin</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #c8a633, #98d836);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            margin-top: 1.5rem;
            background: linear-gradient(to right, #c8a633, #98d836);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Login screen */
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 2rem;
            background-color: #1f1f1f;
            border-radius: 0.5rem;
        }

        .login-container h1 {
            margin-top: 0;
        }

        /* Status bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background-color: #1f1f1f;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #98d836;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .tab {
            flex: 1;
            padding: 0.75rem 1rem;
            background-color: #1f1f1f;
            border: none;
            border-radius: 0.5rem;
            color: #888;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab:hover {
            background-color: #2a2a2a;
        }

        .tab.active {
            background: linear-gradient(to right, #c8a633, #98d836);
            color: #000;
        }

        /* Forms */
        .form-section {
            display: none;
            background-color: #1f1f1f;
            padding: 1.5rem;
            border-radius: 0.5rem;
        }

        .form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #ccc;
        }

        input[type="text"],
        input[type="date"],
        input[type="time"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 0.375rem;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="time"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #98d836;
        }

        /* Checkbox grid */
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.5rem;
            max-height: 300px;
            overflow-y: auto;
            padding: 0.5rem;
            background-color: #2a2a2a;
            border-radius: 0.375rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            background-color: #1f1f1f;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .checkbox-item:hover {
            background-color: #3a3a3a;
        }

        .checkbox-item.selected {
            background: linear-gradient(to right, rgba(200, 166, 51, 0.3), rgba(152, 216, 54, 0.3));
            border: 1px solid #98d836;
        }

        .checkbox-item input[type="checkbox"] {
            accent-color: #98d836;
            width: 18px;
            height: 18px;
        }

        /* Winner selection */
        .winner-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.5rem;
            padding: 0.5rem;
            background-color: #2a2a2a;
            border-radius: 0.375rem;
        }

        .winner-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0.75rem;
            background-color: #1f1f1f;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .winner-item:hover {
            background-color: #3a3a3a;
        }

        .winner-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .winner-item .badge {
            display: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(to right, #c8a633, #98d836);
            color: #000;
            font-weight: 700;
            font-size: 0.8rem;
            align-items: center;
            justify-content: center;
        }

        .winner-item.winner-1 .badge,
        .winner-item.winner-2 .badge,
        .winner-item.winner-3 .badge {
            display: flex;
        }

        .winner-item.winner-1 {
            background: linear-gradient(to right, rgba(255, 215, 0, 0.3), rgba(255, 215, 0, 0.1));
            border: 1px solid gold;
        }

        .winner-item.winner-2 {
            background: linear-gradient(to right, rgba(192, 192, 192, 0.3), rgba(192, 192, 192, 0.1));
            border: 1px solid silver;
        }

        .winner-item.winner-3 {
            background: linear-gradient(to right, rgba(205, 127, 50, 0.3), rgba(205, 127, 50, 0.1));
            border: 1px solid #cd7f32;
        }

        /* Radio group for Hopfenhirn */
        .radio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.5rem;
            padding: 0.5rem;
            background-color: #2a2a2a;
            border-radius: 0.375rem;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            background-color: #1f1f1f;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .radio-item:hover {
            background-color: #3a3a3a;
        }

        .radio-item.selected {
            background: linear-gradient(to right, rgba(200, 166, 51, 0.3), rgba(152, 216, 54, 0.3));
            border: 1px solid #98d836;
        }

        .radio-item input[type="radio"] {
            accent-color: #98d836;
            width: 18px;
            height: 18px;
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.375rem;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(to right, #c8a633, #98d836);
            color: #000;
        }

        .btn-primary:hover {
            background: linear-gradient(to right, #d4b040, #a5e042);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background-color: #3a3a3a;
            color: #fff;
        }

        .btn-secondary:hover {
            background-color: #4a4a4a;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        /* Add member input row */
        .add-member-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .add-member-row input {
            flex: 1;
        }

        /* Messages */
        .message {
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
            display: none;
        }

        .message.success {
            background-color: rgba(152, 216, 54, 0.2);
            border: 1px solid #98d836;
            color: #98d836;
            display: block;
        }

        .message.error {
            background-color: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #dc3545;
            display: block;
        }

        .message a {
            color: inherit;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .checkbox-grid,
            .winner-grid,
            .radio-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .tabs {
                flex-direction: column;
            }

            h1 {
                font-size: 1.5rem;
            }

            h2 {
                font-size: 1.25rem;
            }
        }

        /* Hidden helper */
        .hidden {
            display: none !important;
        }

        /* Info text */
        .info-text {
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.25rem;
        }

        /* Selected winners display */
        .selected-winners {
            margin-top: 0.5rem;
            padding: 0.5rem;
            background-color: #2a2a2a;
            border-radius: 0.375rem;
            font-size: 0.9rem;
        }

        .selected-winners span {
            margin-right: 1rem;
        }

        /* Clear button */
        .clear-btn {
            margin-left: 0.5rem;
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            background-color: #3a3a3a;
            border: none;
            border-radius: 0.25rem;
            color: #888;
            cursor: pointer;
        }

        .clear-btn:hover {
            background-color: #4a4a4a;
            color: #fff;
        }
    </style>
</head>

<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <h1>Hopfenhirne Admin</h1>
        <div id="loginMessage" class="message"></div>
        <div class="form-group">
            <label for="patInput">GitHub Personal Access Token</label>
            <input type="password" id="patInput" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <button class="btn btn-primary" style="width: 100%;" onclick="login()">Login</button>

    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="container hidden">
        <h1>Hopfenhirne Admin</h1>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>Verbunden</span>
            </div>
            <button class="btn btn-secondary btn-small" onclick="logout()">Logout</button>
        </div>

        <!-- Message Area -->
        <div id="adminMessage" class="message"></div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('event')">Event hinzufuegen</button>
            <button class="tab" onclick="switchTab('quiz')">Quiz-Daten hinzufuegen</button>
        </div>

        <!-- Add Event Form -->
        <div id="eventForm" class="form-section active">
            <h2>Neues Event</h2>
            <div class="form-group">
                <label for="eventDate">Datum *</label>
                <input type="date" id="eventDate" required>
            </div>
            <div class="form-group">
                <label for="eventTime">Uhrzeit *</label>
                <input type="time" id="eventTime" value="18:00" required>
            </div>
            <div class="form-group">
                <label for="eventName">Event-Name *</label>
                <input type="text" id="eventName" value="Stammtisch">
            </div>
            <button class="btn btn-primary" onclick="submitEvent()" id="submitEventBtn">Event hinzufuegen</button>
        </div>

        <!-- Add Quiz Data Form -->
        <div id="quizForm" class="form-section">
            <h2>Quiz-Daten</h2>

            <div class="form-group">
                <label for="quizDate">Datum *</label>
                <input type="date" id="quizDate" required>
            </div>

            <div class="form-group">
                <label>Teilnehmer *</label>
                <div id="attendeesGrid" class="checkbox-grid"></div>
                <div class="add-member-row">
                    <input type="text" id="newMemberInput" placeholder="Neues Mitglied hinzufuegen">
                    <button class="btn btn-secondary btn-small" onclick="addNewMember()">Hinzufuegen</button>
                </div>
            </div>

            <div class="form-group">
                <label>Quizmaster (aus Teilnehmern)</label>
                <p class="info-text">Waehle zuerst Teilnehmer aus</p>
                <div id="quizmastersGrid" class="checkbox-grid"></div>
            </div>

            <div class="form-group">
                <label>
                    Gewinner (1., 2., 3. Platz)
                    <button class="clear-btn" onclick="clearWinners()">Zuruecksetzen</button>
                </label>
                <p class="info-text">Klicke in der Reihenfolge der Platzierung (Quizmaster sind ausgeschlossen)</p>
                <div id="winnersGrid" class="winner-grid"></div>
                <div id="selectedWinners" class="selected-winners hidden">
                    <span id="winner1"></span>
                    <span id="winner2"></span>
                    <span id="winner3"></span>
                </div>
            </div>

            <div class="form-group">
                <label>Hopfenhirn des Monats</label>
                <p class="info-text">Waehle aus den Teilnehmern (ohne Quizmaster)</p>
                <div id="hopfenhirnGrid" class="radio-grid"></div>
            </div>

            <button class="btn btn-primary" onclick="submitQuizData()" id="submitQuizBtn">Quiz-Daten hinzufuegen</button>
        </div>
    </div>

    <script>
        const GITHUB_REPO = 'selmaohneh/hopfenhirne';

        // State
        let members = [];
        let selectedAttendees = new Set();
        let selectedQuizmasters = new Set();
        let winners = []; // Array of up to 3 winners in order
        let selectedHopfenhirn = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            // Check for existing token
            const token = sessionStorage.getItem('github_pat');
            if (token) {
                const valid = await validateToken(token);
                if (valid) {
                    showAdminPanel();
                    await loadMembers();
                } else {
                    sessionStorage.removeItem('github_pat');
                }
            }
        });

        // Token validation
        async function validateToken(token) {
            try {
                const response = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                return response.ok;
            } catch {
                return false;
            }
        }

        // Login
        async function login() {
            const token = document.getElementById('patInput').value.trim();
            const messageDiv = document.getElementById('loginMessage');

            if (!token) {
                showMessage(messageDiv, 'Bitte gib einen Token ein.', 'error');
                return;
            }

            const valid = await validateToken(token);
            if (valid) {
                sessionStorage.setItem('github_pat', token);
                showAdminPanel();
                await loadMembers();
            } else {
                showMessage(messageDiv, 'Ungueltiger Token. Bitte ueberpruefen.', 'error');
            }
        }

        // Logout
        function logout() {
            sessionStorage.removeItem('github_pat');
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('patInput').value = '';
        }

        // Show admin panel
        function showAdminPanel() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
        }

        // Load members from stats.json
        async function loadMembers() {
            try {
                const response = await fetch('stats.json');
                if (response.ok) {
                    const stats = await response.json();
                    members = Object.keys(stats).sort((a, b) => a.localeCompare(b));
                    renderAttendeesGrid();
                }
            } catch (error) {
                console.error('Error loading members:', error);
            }
        }

        // Render attendees grid
        function renderAttendeesGrid() {
            const grid = document.getElementById('attendeesGrid');
            grid.innerHTML = members.map(name => `
                <label class="checkbox-item ${selectedAttendees.has(name) ? 'selected' : ''}" data-name="${name}">
                    <input type="checkbox" ${selectedAttendees.has(name) ? 'checked' : ''} onchange="toggleAttendee('${escapeHtml(name)}')">
                    <span>${escapeHtml(name)}</span>
                </label>
            `).join('');
        }

        // Toggle attendee selection
        function toggleAttendee(name) {
            if (selectedAttendees.has(name)) {
                selectedAttendees.delete(name);
                // Also remove from quizmasters, winners, hopfenhirn if selected
                selectedQuizmasters.delete(name);
                winners = winners.filter(w => w !== name);
                if (selectedHopfenhirn === name) selectedHopfenhirn = null;
            } else {
                selectedAttendees.add(name);
            }
            renderAttendeesGrid();
            renderQuizmastersGrid();
            renderWinnersGrid();
            renderHopfenhirnGrid();
        }

        // Render quizmasters grid (only from attendees)
        function renderQuizmastersGrid() {
            const grid = document.getElementById('quizmastersGrid');
            const attendeesArray = Array.from(selectedAttendees).sort();

            if (attendeesArray.length === 0) {
                grid.innerHTML = '<p style="color: #666; padding: 0.5rem;">Keine Teilnehmer ausgewaehlt</p>';
                return;
            }

            grid.innerHTML = attendeesArray.map(name => `
                <label class="checkbox-item ${selectedQuizmasters.has(name) ? 'selected' : ''}" data-name="${name}">
                    <input type="checkbox" ${selectedQuizmasters.has(name) ? 'checked' : ''} onchange="toggleQuizmaster('${escapeHtml(name)}')">
                    <span>${escapeHtml(name)}</span>
                </label>
            `).join('');
        }

        // Toggle quizmaster selection
        function toggleQuizmaster(name) {
            if (selectedQuizmasters.has(name)) {
                selectedQuizmasters.delete(name);
            } else {
                selectedQuizmasters.add(name);
                // Remove from winners if they were selected
                winners = winners.filter(w => w !== name);
                if (selectedHopfenhirn === name) selectedHopfenhirn = null;
            }
            renderQuizmastersGrid();
            renderWinnersGrid();
            renderHopfenhirnGrid();
        }

        // Render winners grid (attendees minus quizmasters)
        function renderWinnersGrid() {
            const grid = document.getElementById('winnersGrid');
            const eligible = Array.from(selectedAttendees)
                .filter(name => !selectedQuizmasters.has(name))
                .sort();

            if (eligible.length === 0) {
                grid.innerHTML = '<p style="color: #666; padding: 0.5rem;">Keine Teilnehmer verfuegbar (oder alle sind Quizmaster)</p>';
                document.getElementById('selectedWinners').classList.add('hidden');
                return;
            }

            grid.innerHTML = eligible.map(name => {
                const winnerIndex = winners.indexOf(name);
                const winnerClass = winnerIndex >= 0 ? `winner-${winnerIndex + 1}` : '';
                const isDisabled = winners.length >= 3 && winnerIndex < 0;

                return `
                    <div class="winner-item ${winnerClass} ${isDisabled ? 'disabled' : ''}"
                         onclick="${isDisabled ? '' : `toggleWinner('${escapeHtml(name)}')`}">
                        <span>${escapeHtml(name)}</span>
                        <div class="badge">${winnerIndex >= 0 ? winnerIndex + 1 : ''}</div>
                    </div>
                `;
            }).join('');

            // Update selected winners display
            const display = document.getElementById('selectedWinners');
            if (winners.length > 0) {
                display.classList.remove('hidden');
                document.getElementById('winner1').textContent = winners[0] ? `1. ${winners[0]}` : '';
                document.getElementById('winner2').textContent = winners[1] ? `2. ${winners[1]}` : '';
                document.getElementById('winner3').textContent = winners[2] ? `3. ${winners[2]}` : '';
            } else {
                display.classList.add('hidden');
            }
        }

        // Toggle winner selection
        function toggleWinner(name) {
            const index = winners.indexOf(name);
            if (index >= 0) {
                // Remove this winner and shift others
                winners.splice(index, 1);
            } else if (winners.length < 3) {
                winners.push(name);
            }
            renderWinnersGrid();
        }

        // Clear winners
        function clearWinners() {
            winners = [];
            renderWinnersGrid();
        }

        // Render Hopfenhirn grid (attendees minus quizmasters)
        function renderHopfenhirnGrid() {
            const grid = document.getElementById('hopfenhirnGrid');
            const eligible = Array.from(selectedAttendees)
                .filter(name => !selectedQuizmasters.has(name))
                .sort();

            if (eligible.length === 0) {
                grid.innerHTML = '<p style="color: #666; padding: 0.5rem;">Keine Teilnehmer verfuegbar (oder alle sind Quizmaster)</p>';
                return;
            }

            grid.innerHTML = eligible.map(name => `
                <label class="radio-item ${selectedHopfenhirn === name ? 'selected' : ''}" data-name="${name}">
                    <input type="radio" name="hopfenhirn" ${selectedHopfenhirn === name ? 'checked' : ''} onchange="selectHopfenhirn('${escapeHtml(name)}')">
                    <span>${escapeHtml(name)}</span>
                </label>
            `).join('');
        }

        // Select Hopfenhirn
        function selectHopfenhirn(name) {
            selectedHopfenhirn = name;
            renderHopfenhirnGrid();
        }

        // Add new member
        function addNewMember() {
            const input = document.getElementById('newMemberInput');
            const name = input.value.trim();

            if (!name) return;

            if (!members.includes(name)) {
                members.push(name);
                members.sort((a, b) => a.localeCompare(b));
            }

            selectedAttendees.add(name);
            input.value = '';

            renderAttendeesGrid();
            renderQuizmastersGrid();
            renderWinnersGrid();
            renderHopfenhirnGrid();
        }

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));

            if (tab === 'event') {
                document.querySelector('.tabs .tab:first-child').classList.add('active');
                document.getElementById('eventForm').classList.add('active');
            } else {
                document.querySelector('.tabs .tab:last-child').classList.add('active');
                document.getElementById('quizForm').classList.add('active');
            }

            // Clear any messages
            hideMessage(document.getElementById('adminMessage'));
        }

        // Submit event
        async function submitEvent() {
            const messageDiv = document.getElementById('adminMessage');
            const btn = document.getElementById('submitEventBtn');

            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;
            const name = document.getElementById('eventName').value.trim();

            if (!date || !time || !name) {
                showMessage(messageDiv, 'Bitte alle Pflichtfelder ausfuellen.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Wird gesendet...';

            try {
                const token = sessionStorage.getItem('github_pat');
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/add-event.yml/dispatches`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            ref: 'master',
                            inputs: { date, time, name }
                        })
                    }
                );

                if (response.status === 204) {
                    showMessage(messageDiv,
                        `Event erfolgreich hinzugefuegt! <a href="https://github.com/${GITHUB_REPO}/actions" target="_blank">Workflow ansehen</a> | <a href="https://github.com/${GITHUB_REPO}/pulls" target="_blank">PRs ansehen</a>`,
                        'success'
                    );
                    // Reset form
                    document.getElementById('eventDate').value = '';
                    document.getElementById('eventTime').value = '18:00';
                    document.getElementById('eventName').value = 'Stammtisch';
                } else {
                    const error = await response.json();
                    throw new Error(error.message || 'Workflow konnte nicht gestartet werden.');
                }
            } catch (error) {
                showMessage(messageDiv, `Fehler: ${error.message}`, 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Event hinzufuegen';
        }

        // Submit quiz data
        async function submitQuizData() {
            const messageDiv = document.getElementById('adminMessage');
            const btn = document.getElementById('submitQuizBtn');

            const date = document.getElementById('quizDate').value;
            const attendees = Array.from(selectedAttendees).join(', ');
            const quizmasters = Array.from(selectedQuizmasters).join(', ');
            const winnersStr = winners.join(', ');
            const hopfenhirn = selectedHopfenhirn || '';

            if (!date) {
                showMessage(messageDiv, 'Bitte ein Datum auswaehlen.', 'error');
                return;
            }

            if (selectedAttendees.size === 0) {
                showMessage(messageDiv, 'Bitte mindestens einen Teilnehmer auswaehlen.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Wird gesendet...';

            try {
                const token = sessionStorage.getItem('github_pat');
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/add-quiz-data.yml/dispatches`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            ref: 'master',
                            inputs: {
                                date,
                                attendees,
                                quizmasters,
                                winners: winnersStr,
                                hopfenhirn_des_monats: hopfenhirn
                            }
                        })
                    }
                );

                if (response.status === 204) {
                    showMessage(messageDiv,
                        `Quiz-Daten erfolgreich hinzugefuegt! <a href="https://github.com/${GITHUB_REPO}/actions" target="_blank">Workflow ansehen</a> | <a href="https://github.com/${GITHUB_REPO}/pulls" target="_blank">PRs ansehen</a>`,
                        'success'
                    );
                    // Reset form
                    document.getElementById('quizDate').value = '';
                    selectedAttendees.clear();
                    selectedQuizmasters.clear();
                    winners = [];
                    selectedHopfenhirn = null;
                    renderAttendeesGrid();
                    renderQuizmastersGrid();
                    renderWinnersGrid();
                    renderHopfenhirnGrid();
                } else {
                    const error = await response.json();
                    throw new Error(error.message || 'Workflow konnte nicht gestartet werden.');
                }
            } catch (error) {
                showMessage(messageDiv, `Fehler: ${error.message}`, 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Quiz-Daten hinzufuegen';
        }

        // Helper functions
        function showMessage(div, message, type) {
            div.innerHTML = message;
            div.className = `message ${type}`;
        }

        function hideMessage(div) {
            div.className = 'message';
            div.innerHTML = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Enter key to submit login
        document.getElementById('patInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        // Allow Enter key to add new member
        document.getElementById('newMemberInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addNewMember();
        });
    </script>
</body>

</html>
